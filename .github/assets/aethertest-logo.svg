<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1">
                <animate attributeName="stop-color" values="#8b5cf6;#06b6d4;#8b5cf6" dur="4s"
                    repeatCount="indefinite" />
            </stop>
            <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1">
                <animate attributeName="stop-color" values="#06b6d4;#8b5cf6;#06b6d4" dur="4s"
                    repeatCount="indefinite" />
            </stop>
        </linearGradient>

        <!-- Glow effect -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Animated circles representing AI agents -->
    <circle cx="50" cy="100" r="8" fill="url(#gradient)" opacity="0.8" filter="url(#glow)">
        <animate attributeName="cy" values="100;80;100" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite" />
    </circle>

    <circle cx="100" cy="100" r="8" fill="url(#gradient)" opacity="0.8" filter="url(#glow)">
        <animate attributeName="cy" values="100;80;100" dur="2s" begin="0.4s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" begin="0.4s" repeatCount="indefinite" />
    </circle>

    <circle cx="150" cy="100" r="8" fill="url(#gradient)" opacity="0.8" filter="url(#glow)">
        <animate attributeName="cy" values="100;80;100" dur="2s" begin="0.8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" begin="0.8s" repeatCount="indefinite" />
    </circle>

    <circle cx="200" cy="100" r="8" fill="url(#gradient)" opacity="0.8" filter="url(#glow)">
        <animate attributeName="cy" values="100;80;100" dur="2s" begin="1.2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" begin="1.2s" repeatCount="indefinite" />
    </circle>

    <circle cx="250" cy="100" r="8" fill="url(#gradient)" opacity="0.8" filter="url(#glow)">
        <animate attributeName="cy" values="100;80;100" dur="2s" begin="1.6s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" begin="1.6s" repeatCount="indefinite" />
    </circle>

    <!-- Main Title -->
    <text x="300" y="90" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#gradient)">
        AetherTest
    </text>

    <!-- Subtitle with typing effect -->
    <text x="300" y="130" font-family="monospace" font-size="18" fill="#64748b">
        Autonomous STLC Engine
        <animate attributeName="opacity" values="0;1;1;1" dur="3s" repeatCount="indefinite" />
    </text>

    <!-- Flowing particles -->
    <circle cx="0" cy="170" r="3" fill="#8b5cf6" opacity="0.6">
        <animate attributeName="cx" from="0" to="800" dur="8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;0.6;0.6;0" dur="8s" repeatCount="indefinite" />
    </circle>

    <circle cx="0" cy="175" r="2" fill="#06b6d4" opacity="0.6">
        <animate attributeName="cx" from="0" to="800" dur="10s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;0.6;0.6;0" dur="10s" repeatCount="indefinite" />
    </circle>

    <circle cx="0" cy="180" r="2.5" fill="#8b5cf6" opacity="0.6">
        <animate attributeName="cx" from="0" to="800" dur="12s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0;0.6;0.6;0" dur="12s" repeatCount="indefinite" />
    </circle>
</svg>